<!DOCTYPE html>
<html>
<head>
    <title>School Result</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 350px;
            box-shadow: 0px 0px 10px gray;
            border-radius: 10px;
        }
        h2 {
            background: darkblue;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
        input {
            padding: 10px;
            width: 80%;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
            color: darkred;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>DIET COLLEGE BHAGALPUR</h2>
    <p>D.El.Ed Result 2018/20</p>

    <input type="text" id="roll" placeholder="Enter Roll Number">
    <br>
    <button onclick="checkResult()">Show Result</button>

    <div class="result" id="output"></div>
</div>

<script>
function checkResult() {
    var roll = document.getElementById("roll").value;
    var result = "";

    if(roll == "201") {
        result = "Name: Suraj Ravi Das <br> Result: 2200 / 1892 PASS <br> Percentage: 86%%";
    } else if(roll == "202") {
        result = "Name: Nicky Kumari <br> Result: PASS <br> Percentage: 72%";
    } else {
        result = "Result Not Found";
    }

    document.getElementById("output").innerHTML = result;
}
</script>

</body>
</html>
